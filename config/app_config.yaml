# =============================================================================
# MMCD Metrics - Application Configuration
# =============================================================================
# Changes to this file take effect on next app restart (or cache clear).
# =============================================================================


# =============================================================================
# CACHE TTL SETTINGS (seconds)
# =============================================================================
# Controls how long different data types are cached in Redis.
# Shorter TTLs mean fresher data but more DB load.
# Longer TTLs reduce DB load but data may be stale.
cache:
  ttl:
    historical_averages: 1209600   # 14 days — 10-year weekly averages (slow to change)
    lookup_tables: 1209600         # 14 days — facilities, foremen, species, etc.
    fos_drilldown: 604800          # 7 days  — FOS-level drill-down data
    color_mappings: 604800         # 7 days  — status/facility/FOS color maps
    facility_historical: 86400     # 24 hours — facility-filtered historical averages
    general: 300                   # 5 min   — general app-level cache
    db_queries: 120                # 2 min   — raw database query results
    charts: 120                    # 2 min   — rendered plotly chart objects
    stat_boxes: 120                # 2 min   — computed stat box values


# =============================================================================
# VALUE BOX COLOR THRESHOLDS
# =============================================================================
# Controls the green/yellow/red status colors on overview dashboard value boxes.
#
# Each metric uses one of four comparison modes:
#   historical  — compares current week value to 10-year weekly average
#   fixed_pct   — compares value against absolute percentage thresholds
#   pct_of_avg  — compares value as a percentage of historical average
#   capacity    — compares against a fixed capacity number
#
# direction:
#   higher_is_better — green when above threshold (treatments, coverage)
#   lower_is_better  — green when below threshold (mosquitoes, vector index)

thresholds:

  # Status indicator colors (hex)
  colors:
    good: "#16a34a"       # Green  — on track or better than average
    warning: "#eab308"    # Yellow — slightly behind or approaching concern
    alert: "#dc2626"      # Red    — significantly behind or at alert level

  # --- Historical comparison metrics ---
  # Multipliers applied to 10-year weekly average
  # Example: good=0.9 means "green if current >= avg * 0.9"
  historical:
    default:
      direction: higher_is_better
      good: 0.9           # Green if current >= 90% of historical avg
      warning: 0.8         # Yellow if current >= 80%, Red if below
    mosquito_monitoring:
      direction: lower_is_better
      good: 1.1            # Green if current <= 110% of historical avg
      warning: 1.2          # Yellow if current <= 120%, Red if above

  # --- Fixed percentage metrics ---
  # Value is compared directly against these percentage thresholds
  fixed_pct:
    air_sites:
      direction: higher_is_better
      good: 85             # Green if >= 85% treated
      warning: 60          # Yellow if >= 60%, Red if below
    prehatch_coverage:
      direction: higher_is_better
      good: 85             # Green if >= 85% recently inspected
      warning: 60          # Yellow if >= 60%, Red if below
    vector_index:
      direction: lower_is_better
      good: 30             # Green if VI <= 30
      warning: 60          # Yellow if VI <= 60, Red if above

  # --- Percentage of average metrics ---
  # current value expressed as % of historical avg (100 = exactly average)
  pct_of_average:
    mosquito_monitoring:
      direction: lower_is_better
      good: 110            # Green if current <= 110% of avg
      warning: 130         # Yellow if <= 130%, Red if above

  # --- Capacity-based metrics ---
  # Compared against absolute capacity numbers
  capacity:
    suco:
      direction: lower_is_better
      at_capacity: 72      # Red if >= 72 (at weekly capacity)
      near_capacity: 60    # Yellow if >= 60 (approaching capacity)


